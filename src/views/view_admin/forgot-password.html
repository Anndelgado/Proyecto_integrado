<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | Barranquilla Convive</title>

    <link rel="stylesheet" href="/src/views/view_admin/css/password.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <div class="logo">
            <i class="fa-solid fa-shield-heart"></i>
            <h1>Barranquilla Convive</h1>
        </div>

        <h2>¿Olvidaste tu contraseña?</h2>

        <p>
            Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form>

            <label>Correo electrónico</label>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    placeholder="correo@ejemplo.com"
                    required
                >
            </div>

            <button type="submit">
                Enviar enlace
            </button>

        </form>

        <a href="login.html" class="back">
            <i class="fa-solid fa-arrow-left"></i>
            Volver al inicio de sesión
        </a>

    </div>

</div>

<script src="/src/views/aut/forgot-password.js"></script>

</body>
</html>
