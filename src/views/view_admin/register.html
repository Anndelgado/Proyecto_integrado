<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="/src/views/view_admin/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="card">
    <div class="tag">
        <div class="square green"></div>
        <span>Registro</span>
    </div>

    <h1>Crear cuenta de estudiante</h1>
    <p class="subtitle">
        Docentes y directivos se crean desde el panel institucional.
    </p>

    <!-- 🛠️ Agregado ID al formulario -->
    <form id="register-form">
        <label>Nombre completo</label>
        <!-- 🛠️ Agregado ID e indicador required -->
        <input type="text" id="register-name" placeholder="Nombre y apellido" required>

        <label>Código de institución</label>
        <!-- 🛠️ Agregado ID e indicador required -->
        <input type="text" id="register-code" placeholder="Ej. IED-4521" required>

        <label>Correo</label>
        <!-- 🛠️ Agregado ID e indicador required -->
        <input type="email" id="register-email" placeholder="correo@ejemplo.com" required>

        <!-- 🛠️ Agregado ID y tipo submit al botón -->
        <button type="submit" class="register" id="btn-register">
            Crear cuenta
        </button>
    </form>

    <p class="footer">
        El código de institución valida que perteneces a un IED registrado.
    </p>
</div>

<!-- 🛠️ Ruta relativa corregida para evitar errores de servidor local -->
<script src="/src/views/aut/register.js" type="module"></script>

</body>
</html>
