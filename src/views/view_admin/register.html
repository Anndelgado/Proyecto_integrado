<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Registro</title>

    <link rel="stylesheet" href="/src/views/view_admin/css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="card">

    <div class="tag">

        <div class="square green"></div>

        <span>Registro</span>

    </div>

    <h1>Crear cuenta de estudiante</h1>

    <p class="subtitle">

        Docentes y directivos se crean desde el panel institucional.

    </p>

    <form>

        <label>Nombre completo</label>

        <input
        type="text"
        placeholder="Nombre y apellido">

        <label>Código de institución</label>

        <input
        type="text"
        placeholder="Ej. IED-4521">

        <label>Correo</label>

        <input
        type="email"
        placeholder="correo@ejemplo.com">

        <button class="register">

            Crear cuenta

        </button>

    </form>

    <p class="footer">

        El código de institución valida que perteneces a un IED registrado.

    </p>

</div>

</body>

</html>
