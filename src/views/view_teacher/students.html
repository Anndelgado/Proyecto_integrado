<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barranquilla Convive - Gestión de Estudiantes</title>
    <link rel="stylesheet" href="./css/teacher.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- Capa oscura de fondo para menú móvil -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-layout">

        <!-- Sidebar Lateral Izquierdo -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-space">
                    <img src="../../public/img/Logo.webp" alt="Barranquilla Convive" class="logo-img" style="max-width: 150px;">
                </div>
                <button class="close-sidebar-btn" id="closeSidebarBtn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu">
                <!-- Inyectado dinámicamente desde el script general -->
            </nav>
        </aside>

        <!-- Contenedor de Contenido -->
        <div class="main-wrapper">

            <!-- Topbar Corregido (Sin campana de alertas) -->
            <header class="top-header">
                <button class="menu-toggle-btn" id="menuToggleBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
                <div class="top-header-right">
                    <div class="profile-dropdown-container">
                        <button class="profile-trigger" id="profileDropdownBtn">
                            <div class="avatar-circle">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <span class="profile-name">Profesor (9°A)</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="/src/views/view_teacher/profile.html" class="dropdown-item">
                                <i class="fa-solid fa-gear"></i> Configuración
                            </a>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item text-danger" id="logoutBtn">
                                <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Área de Gestión de Alumnos -->
            <main class="main-content">
                <div class="welcome-section" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <div>
                        <h1>Gestión de Alumnos</h1>
                        <p class="subtitle">Curso a cargo: <strong>Grupo 9°A</strong></p>
                    </div>
                    <!-- Acciones Colectivas superiores -->
                    <div style="display: flex; gap: 10px;">
                        <label class="btn-action-secondary" style="margin: 0; cursor: pointer;">
                            <i class="fa-solid fa-file-import"></i> Importar BD (JSON)
                            <input type="file" id="importFile" accept=".json" style="display: none;">
                        </label>
                        <button class="btn-action-primary" id="btn-nuevo-estudiante" style="width: auto;">
                            <i class="fa-solid fa-plus"></i> Nuevo Alumno
                        </button>
                    </div>
                </div>

                <!-- Barra de Herramientas: Filtros de Búsqueda -->
                <section class="student-table-card" style="margin-bottom: 20px; padding: 16px 24px;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                        <div>
                            <label style="font-size: 12px; font-weight: 600; color: #64748b; display:block; margin-bottom:6px;">Buscar por nombre</label>
                            <input type="text" id="filter-search" placeholder="Escribe el nombre del alumno..." 
                                style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px;">
                        </div>
                        <div>
                            <label style="font-size: 12px; font-weight: 600; color: #64748b; display:block; margin-bottom:6px;">Estado Emocional</label>
                            <select id="filter-status" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; background:#fff;">
                                <option value="">Todos los estados</option>
                                <option value="Estable">Estable</option>
                                <option value="En riesgo">En riesgo</option>
                                <option value="En riesgo alto">En riesgo alto</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- Tabla Principal -->
                <section class="student-table-card">
                    <div class="table-responsive">
                        <table class="student-table">
                            <thead>
                                <tr>
                                    <th>Nombre del Alumno</th>
                                    <th>Curso</th>
                                    <th>Estado Emocional</th>
                                    <th>Último Test</th>
                                    <th style="text-align: right;">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-gestion-body">
                                <!-- Poblado por JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>

            <footer class="footer">
                <p>&copy; 2026 Barranquilla Convive. Todos los derechos reservados.</p>
            </footer>
        </div>
    </div>

    <!-- MODAL: Crear / Editar Estudiante -->
    <div class="custom-modal" id="modal-estudiante">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Registrar Alumno</h3>
                <button class="close-modal-btn" id="close-student-modal">&times;</button>
            </div>
            <form id="form-estudiante">
                <input type="hidden" id="student-id">
                <div style="margin-bottom: 16px;">
                    <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">Nombre Completo</label>
                    <input type="text" id="student-name" required style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">Curso</label>
                    <input type="text" id="student-course" value="9°A" readonly style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; background:#f1f5f9; color:#64748b;">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">Estado Emocional</label>
                    <select id="student-status" style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px; background:white;">
                        <option value="Estable">Estable</option>
                        <option value="En riesgo">En riesgo</option>
                        <option value="En riesgo alto">En riesgo alto</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">Fecha Último Test</label>
                    <input type="text" id="student-date" placeholder="DD/MM/AAAA" style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:8px;">
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px;">
                    <button type="button" class="btn-action-secondary" id="btn-cancelar-modal" style="width:auto; padding:10px 20px;">Cancelar</button>
                    <button type="submit" class="btn-action-primary" style="width:auto; padding:10px 20px;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../view_admin/global.js"></script>
    <script src="./students.js"></script>
</body>

</html>
