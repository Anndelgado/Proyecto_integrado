<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <link rel="stylesheet" href="/src/views/view_admin/css/auth.css">
</head>
<body>
    <div class="card">
        <div class="tag">
            <div class="square yellow"></div>
            <span>Seguridad</span>
        </div>
        <h1>Nueva contraseña</h1>
        <p class="subtitle">Escribe tu nueva clave de acceso institucional.</p>
        
        <form id="reset-form">
            <label for="new-password">Nueva contraseña</label>
            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required>
            
            <button type="submit" id="btn-reset" class="register">
                Actualizar contraseña
            </button>
        </form>
    </div>

    <script src="./reset-password.js"></script>
</body>
</html>
