<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/src/views/view_admin/css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="card">

        <div class="tag">
            <div class="square yellow"></div>
            <span>Login</span>
        </div>

        <h1>Bienvenido</h1>

        <p class="subtitle">
            Ingresa con tu cuenta institucional
        </p>

        <form id="login-form">

            <label for="email">Correo institucional</label>
            <input type="email" id="email" placeholder="nombre@iedbarranquilla.edu.co">

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">

            <a href="/src/views/aut/forgot-password.html">
                ¿Olvidaste tu contraseña?
            </a>

            <button type="submit" id="btn-submit">
                Ingresar
            </button>

        </form>

        <p class="footer">
            El sistema te redirige según tu rol:
            administrador, docente o estudiante.
        </p>

    </div>

    <script src="/src/views/aut/login.js"></script>
</body>

</html>
